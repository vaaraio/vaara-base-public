<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-label="Vaara X banner">
  <rect width="1500" height="500" fill="#0b0d11"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="166" x2="1500" y2="166" stroke="rgba(120,160,138,0.06)" stroke-width="1"/>
  <line x1="0" y1="333" x2="1500" y2="333" stroke="rgba(120,160,138,0.06)" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="500" stroke="rgba(120,160,138,0.06)" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="500" stroke="rgba(120,160,138,0.06)" stroke-width="1"/>

  <!-- Content shifted right to avoid avatar overlap (avatar covers ~0-200px bottom-left) -->

  <!-- Wordmark — centered -->
  <text x="750" y="230" fill="#f3f5f2" font-family="'Syne', 'Inter', sans-serif" font-size="120" font-weight="700" letter-spacing="18" text-anchor="middle">VAARA</text>

  <!-- Slogan -->
  <text x="750" y="290" fill="rgba(243,245,242,0.45)" font-family="'Manrope', 'Inter', sans-serif" font-size="26" font-weight="400" letter-spacing="6" text-anchor="middle">BUILT TO SEE OVER THE NOISE</text>

  <!-- Live indicator — right side -->
  <circle cx="1300" cy="460" r="5" fill="#78a08a"/>
  <text x="1316" y="466" fill="rgba(243,245,242,0.4)" font-family="'Manrope', 'Inter', sans-serif" font-size="16" font-weight="500" letter-spacing="2">LIVE ON BASE</text>

  <!-- Logo mark — exact avatar proportions scaled to 100px square -->
  <rect x="375" y="172" width="100" height="100" rx="17" fill="rgba(120,160,138,0.12)" stroke="rgba(120,160,138,0.42)" stroke-width="1.5"/>
  <polygon points="425,193 449,247 401,247" fill="#78a08a"/>
</svg>
